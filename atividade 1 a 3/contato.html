<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="contato.css">
  <title>Página contato</title>
</head>
<body>
  <h1>CONTATO</h1>

  <div class="container">
        <div class="caixa">
           <p>
    Caso tenha dúvidas ou sugestões sobre o projeto, entre em contato com a equipe
    de desenvolvimento. Você pode enviar um e-mail para
    <strong>equipe@projeto.com</strong> ou procurar diretamente os responsáveis
    durante o horário escolar. Estamos sempre disponíveis para ajudar e ouvir
    suas ideias!
  </p>  

  <form id="formContato">
  <input id="assunto" type="text" placeholder="Assunto">
  <textarea id="mensagem" placeholder="Mensagem"></textarea>
  <button type="submit">Enviar</button>
</form>


</body>
</html>
